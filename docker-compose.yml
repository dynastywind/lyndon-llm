version: '3.9'

services:
  # ── ChromaDB (dev vector store) ───────────────────────────────────────────
  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - CHROMA_SERVER_AUTH_PROVIDER=none

  # ── Qdrant (prod vector store — run separately in prod) ───────────────────
  # qdrant:
  #   image: qdrant/qdrant:latest
  #   ports:
  #     - "6333:6333"
  #   volumes:
  #     - qdrant_data:/qdrant/storage

  # ── Backend ───────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_data:/app/data
    environment:
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      # Langfuse — set these to enable observability (or put them in .env)
      # - LANGFUSE_SECRET_KEY=sk-lf-...
      # - LANGFUSE_PUBLIC_KEY=pk-lf-...
      # - LANGFUSE_HOST=https://cloud.langfuse.com
    env_file:
      - ./backend/.env
    depends_on:
      - chroma
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app

volumes:
  chroma_data:
  backend_data:
