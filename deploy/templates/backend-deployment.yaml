apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lyndon-llm.fullname" . }}-backend
  labels:
    {{- include "lyndon-llm.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "lyndon-llm.fullname" . }}-backend
      app.kubernetes.io/instance: {{ .Release.Name }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "lyndon-llm.fullname" . }}-backend
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: backend
      annotations:
        # Force pod restart when config or secret changes
        checksum/config: {{ include (print $.Template.BasePath "/backend-configmap.yaml") . | sha256sum }}
        {{- if not .Values.backend.existingSecret }}
        checksum/secret: {{ include (print $.Template.BasePath "/backend-secret.yaml") . | sha256sum }}
        {{- end }}
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.service.port }}
          command:
            - uvicorn
            - api.main:app
            - --host
            - "0.0.0.0"
            - --port
            - {{ .Values.backend.service.port | quote }}
          envFrom:
            - configMapRef:
                name: {{ include "lyndon-llm.fullname" . }}-backend-config
            - secretRef:
                name: {{ include "lyndon-llm.backendSecretName" . }}
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.backend.service.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.backend.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "lyndon-llm.fullname" . }}-backend-data
