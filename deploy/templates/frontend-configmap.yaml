apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "lyndon-llm.fullname" . }}-frontend-nginx
  labels:
    {{- include "lyndon-llm.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
data:
  nginx.conf: |
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Serve React SPA — fall back to index.html for client-side routing
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy API requests to the backend service
        location /api/ {
            proxy_pass         http://{{ include "lyndon-llm.fullname" . }}-backend:{{ .Values.backend.service.port }};
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # SSE / streaming support
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout {{ .Values.frontend.proxyReadTimeout }};
        }

        # Proxy WebSocket connections
        location /ws/ {
            proxy_pass         http://{{ include "lyndon-llm.fullname" . }}-backend:{{ .Values.backend.service.port }};
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout {{ .Values.frontend.proxyReadTimeout }};
        }

        gzip on;
        gzip_types text/plain text/css application/javascript application/json image/svg+xml;
        gzip_min_length 1024;
    }
