{{- if not .Values.backend.existingSecret }}
{{- /* Validate required secrets so helm install fails early rather than starting with blank keys. */}}
{{- if not .Values.backend.secrets.jwtSecretKey }}
  {{- fail "backend.secrets.jwtSecretKey is required. Supply it via values-secrets.yaml or --set backend.secrets.jwtSecretKey=<value>." }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "lyndon-llm.fullname" . }}-backend-secret
  labels:
    {{- include "lyndon-llm.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
type: Opaque
stringData:
  LLM_API_KEY: {{ .Values.backend.secrets.llmApiKey | quote }}
  EMBEDDING_API_KEY: {{ .Values.backend.secrets.embeddingApiKey | quote }}
  LANGFUSE_PUBLIC_KEY: {{ .Values.backend.secrets.langfusePublicKey | quote }}
  LANGFUSE_SECRET_KEY: {{ .Values.backend.secrets.langfuseSecretKey | quote }}
  JWT_SECRET_KEY: {{ .Values.backend.secrets.jwtSecretKey | quote }}
  QDRANT_API_KEY: {{ .Values.backend.secrets.qdrantApiKey | quote }}
{{- end }}
