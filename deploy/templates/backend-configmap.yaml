apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "lyndon-llm.fullname" . }}-backend-config
  labels:
    {{- include "lyndon-llm.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
data:
  ENVIRONMENT: {{ .Values.backend.config.environment | quote }}
  DEBUG: {{ .Values.backend.config.debug | quote }}
  API_HOST: "0.0.0.0"
  API_PORT: {{ .Values.backend.service.port | quote }}

  LLM_BASE_URL: {{ .Values.backend.config.llmBaseUrl | quote }}
  LLM_MODEL: {{ .Values.backend.config.llmModel | quote }}
  LLM_MAX_TOKENS: {{ .Values.backend.config.llmMaxTokens | quote }}
  LLM_TEMPERATURE: {{ .Values.backend.config.llmTemperature | quote }}
  LLM_STREAM: {{ .Values.backend.config.llmStream | quote }}

  EMBEDDING_MODEL: {{ .Values.backend.config.embeddingModel | quote }}
  EMBEDDING_BASE_URL: {{ .Values.backend.config.embeddingBaseUrl | quote }}
  EMBEDDING_DIMENSION: {{ .Values.backend.config.embeddingDimension | quote }}

  VECTOR_STORE_BACKEND: "qdrant"
  QDRANT_HOST: {{ include "lyndon-llm.fullname" . }}-qdrant
  QDRANT_PORT: {{ .Values.qdrant.service.httpPort | quote }}

  DATABASE_URL: "sqlite+aiosqlite:////data/lyndon.db"

  WEB_SEARCH_PROVIDER: {{ .Values.backend.config.webSearchProvider | quote }}
  WEB_SEARCH_MAX_RESULTS: {{ .Values.backend.config.webSearchMaxResults | quote }}

  CORS_ORIGINS: {{ .Values.backend.config.corsOrigins | quote }}

  LANGFUSE_HOST: {{ .Values.backend.config.langfuseHost | quote }}

  SESSION_TTL_SECONDS: {{ .Values.backend.config.sessionTtlSeconds | quote }}
  JWT_ALGORITHM: {{ .Values.backend.config.jwtAlgorithm | quote }}
  JWT_EXPIRE_DAYS: {{ .Values.backend.config.jwtExpireDays | quote }}
