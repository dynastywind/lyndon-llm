apiVersion: v1
kind: Service
metadata:
  name: {{ include "lyndon-llm.fullname" . }}-frontend
  labels:
    {{- include "lyndon-llm.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  selector:
    app.kubernetes.io/name: {{ include "lyndon-llm.fullname" . }}-frontend
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.frontend.service.port }}
      targetPort: 80
  type: ClusterIP
